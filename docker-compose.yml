version: '3.8'
services:
  web:
    build: .
    ports:
      - "8080:80"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=ecoraee_uac;User=root;Password=root123;
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ecoraee_uac
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
